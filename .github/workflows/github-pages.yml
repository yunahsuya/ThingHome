# Vite/Next 專案在子資料夾 thinghome/
# 網址：https://yunahsuya.github.io/ThingHome/
# Settings → Pages → Source 請選「GitHub Actions」

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: thinghome-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: thinghome/package-lock.json

      - name: Install and build
        working-directory: thinghome
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Verify out has index.html
        run: |
          ls -la thinghome/out
          test -f thinghome/out/index.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: thinghome/out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
